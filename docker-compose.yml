name: ops-agent

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    command:
      - sh
      - -ec
      - |
        alembic upgrade head
        python -m app.seed
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  agent:
    build:
      context: ./agent
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      API_TIMEOUT_SECONDS: ${API_TIMEOUT_SECONDS:-5}
      API_MAX_RETRIES: ${API_MAX_RETRIES:-2}
      API_RETRY_DELAY_SECONDS: ${API_RETRY_DELAY_SECONDS:-.1}
      CHECKPOINT_DATABASE_URL: ${CHECKPOINT_DATABASE_URL:?Set CHECKPOINT_DATABASE_URL in .env}
      CHECKPOINT_SCHEMA: ${CHECKPOINT_SCHEMA:-agent_checkpoints}
      MAX_TOOL_ROUNDS: ${MAX_TOOL_ROUNDS:-4}
      RECURSION_LIMIT: ${RECURSION_LIMIT:-25}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-ops-agent}
    ports:
      - "127.0.0.1:${AGENT_PORT:-8001}:8001"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AGENT_URL: ${VITE_AGENT_URL:-http://localhost:8001}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:5173/",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
