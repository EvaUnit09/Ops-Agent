version: "3.9"

services:
  db:
    image: postgres:16
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db

  agent:
    build: ./agent
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - api

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - agent

volumes:
  pgdata:
